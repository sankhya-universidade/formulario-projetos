<style>
  :root{
    --navy-900:#0A1628;
    --navy-700:#162D52;
    --navy-600:#1E3B68;
    --green:#2ECC52;
    --green-dark:#1E9E3E;
    --bg:#F4F6F8;
    --card:#FFFFFF;
    --line:#E3E7EC;
    --text:#16202E;
    --text-muted:#5B6675;
    --radius:14px;
    --shadow:0 2px 10px rgba(10,22,40,0.06);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Inter',system-ui,sans-serif;
    background:var(--bg);
    color:var(--text);
    -webkit-font-smoothing:antialiased;
  }
  #app{max-width:760px;margin:0 auto;padding:0 0 80px;}

  /* Header */
  .hero{
    background:linear-gradient(135deg,var(--navy-900),var(--navy-700));
    color:#fff;
    padding:28px 24px 34px;
    border-radius:0 0 24px 24px;
    position:relative;
    overflow:hidden;
  }
  .hero::after{
    content:"";
    position:absolute; right:-60px; top:-60px;
    width:220px; height:220px; border-radius:50%;
    background:radial-gradient(circle, rgba(46,204,82,0.22), transparent 70%);
  }
  .hero-badge{
    display:inline-block; font-size:12px; font-weight:600; letter-spacing:.04em;
    color:var(--green); background:rgba(46,204,82,0.14);
    padding:5px 11px; border-radius:20px; margin-bottom:14px;
  }
  .hero h1{font-size:22px; font-weight:700; margin:0 0 8px; line-height:1.3;}
  .hero p{font-size:14px; color:#C7D0DE; margin:0; line-height:1.55; max-width:520px;}

  .content-card{
    background:var(--card);
    border-radius:0 0 20px 20px;
    box-shadow:var(--shadow);
    padding-bottom:24px;
  }

  /* Progress */
  .progress-wrap{padding:18px 24px 0;}
  .progress-track{height:6px; background:var(--line); border-radius:6px; overflow:hidden;}
  .progress-fill{height:100%; background:var(--green); border-radius:6px; transition:width .35s ease;}
  .progress-label{display:flex; justify-content:space-between; font-size:12px; color:var(--text-muted); margin-top:7px;}

  /* Cards / steps */
  .step{padding:22px 24px 0; animation:fade .25s ease;}
  @keyframes fade{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);}}
  .step h2{font-size:19px; font-weight:600; margin:0 0 6px;}
  .step .sub{font-size:14px; color:var(--text-muted); margin:0 0 20px; line-height:1.5;}

  label.field-label{display:block; font-size:13px; font-weight:600; color:var(--text); margin:0 0 6px;}
  input[type=text], input[type=email], textarea{
    width:100%; font-family:inherit; font-size:14px; color:var(--text);
    padding:12px 14px; border:1px solid var(--line); border-radius:10px;
    background:#fff; margin-bottom:16px; outline:none; transition:border-color .15s;
  }
  input:focus, textarea:focus{border-color:var(--green);}
  textarea{min-height:70px; resize:vertical;}

  /* Area cards */
  .area-grid{display:grid; gap:12px;}
  .area-card{
    background:var(--bg); border:1.5px solid var(--line); border-radius:var(--radius);
    padding:16px 18px; cursor:pointer; transition:.15s; display:flex; align-items:center; gap:14px;
  }
  .area-card:hover{border-color:#B9E8C4;}
  .area-card.selected{border-color:var(--green); background:#F1FBF3;}
  .area-icon{
    width:40px; height:40px; border-radius:10px; background:var(--navy-700);
    display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; color:#fff;
  }
  .area-card.selected .area-icon{background:var(--green-dark);}
  .area-name{font-size:15px; font-weight:600; margin:0 0 2px;}
  .area-count{font-size:12.5px; color:var(--text-muted); margin:0;}
  .check-dot{
    margin-left:auto; width:22px; height:22px; border-radius:50%; border:1.5px solid var(--line);
    flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:13px; color:#fff;
  }
  .area-card.selected .check-dot{background:var(--green); border-color:var(--green);}

  /* Module cards */
  .module-group-title{
    font-size:12.5px; font-weight:700; text-transform:uppercase; letter-spacing:.04em;
    color:var(--navy-600); margin:22px 0 10px;
  }
  .module-group-title:first-child{margin-top:0;}
  .module-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  @media(max-width:520px){.module-grid{grid-template-columns:1fr;}}
  .module-card{
    background:var(--bg); border:1.5px solid var(--line); border-radius:12px;
    padding:13px 14px; cursor:pointer; transition:.15s; position:relative;
  }
  .module-card:hover{border-color:#B9E8C4;}
  .module-card.selected{border-color:var(--green); background:#F1FBF3;}
  .module-card .m-top{display:flex; align-items:center; gap:9px; margin-bottom:3px;}
  .module-card .m-icon{font-size:17px;}
  .module-card .m-name{font-size:13.5px; font-weight:600; line-height:1.3;}
  .module-card .m-count{font-size:11.5px; color:var(--text-muted); margin-left:26px;}
  .module-card .m-check{
    position:absolute; top:10px; right:10px; width:18px; height:18px; border-radius:50%;
    border:1.5px solid var(--line); display:flex; align-items:center; justify-content:center; font-size:11px; color:#fff;
  }
  .module-card.selected .m-check{background:var(--green); border-color:var(--green);}

  /* Chips */
  .chip-wrap{display:flex; flex-wrap:wrap; gap:8px; margin-bottom:6px;}
  .chip{
    border:1.5px solid var(--line); background:#fff; color:var(--text);
    font-size:13px; font-weight:500; padding:8px 14px; border-radius:20px; cursor:pointer; transition:.15s;
  }
  .chip:hover{border-color:#B9E8C4;}
  .chip.selected{background:var(--navy-700); border-color:var(--navy-700); color:#fff;}
  .select-all-btn{background:none;border:none;color:var(--navy-600);font-size:12.5px;font-weight:600;cursor:pointer;padding:0;}
  .select-all-btn:hover{color:var(--green-dark);}

  .details-toggle{
    display:inline-flex; align-items:center; gap:6px; font-size:13px; font-weight:600;
    color:var(--navy-600); background:none; border:none; cursor:pointer; padding:10px 0 4px; margin-bottom:8px;
  }
  .details-toggle .arrow{transition:transform .15s;}
  .details-toggle.open .arrow{transform:rotate(90deg);}
  .programmatic{
    background:#F8F9FA; border:1px solid var(--line); border-radius:10px; padding:14px 16px;
    margin-bottom:16px; max-height:320px; overflow-y:auto;
  }
  .programmatic h4{font-size:12.5px; font-weight:700; color:var(--navy-700); margin:12px 0 5px;}
  .programmatic h4:first-child{margin-top:0;}
  .programmatic ul{margin:0 0 4px; padding-left:18px;}
  .programmatic li{font-size:12.5px; color:var(--text-muted); line-height:1.6;}

  /* Module detail card wrapper */
  .module-detail-card{
    background:var(--bg); border:1px solid var(--line); border-radius:var(--radius);
    padding:20px; margin-bottom:18px;
  }
  .md-header{display:flex; align-items:center; gap:10px; margin-bottom:4px;}
  .md-header .m-icon{font-size:20px;}
  .md-header h3{font-size:16.5px; font-weight:600; margin:0;}
  .md-index{font-size:12.5px; color:var(--text-muted); margin:0 0 14px;}

  .row-2{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
  @media(max-width:520px){.row-2{grid-template-columns:1fr;}}

  /* Buttons */
  .nav-bar{display:flex; justify-content:space-between; align-items:center; padding:26px 24px 0; gap:12px;}
  .btn{
    font-family:inherit; font-size:14.5px; font-weight:600; padding:12px 22px; border-radius:10px;
    border:none; cursor:pointer; transition:.15s;
  }
  .btn-primary{background:var(--green); color:#fff;}
  .btn-primary:hover{background:var(--green-dark);}
  .btn-primary:disabled{background:#C8CFD8; cursor:not-allowed;}
  .btn-ghost{background:none; color:var(--text-muted); padding:12px 8px;}
  .btn-ghost:hover{color:var(--text);}

  /* Review */
  .review-block{
    background:var(--bg); border:1px solid var(--line); border-radius:12px; padding:16px 18px; margin-bottom:12px;
  }
  .review-block h4{font-size:14px; font-weight:600; margin:0 0 8px; display:flex; align-items:center; gap:8px;}
  .review-block .rb-meta{font-size:12.5px; color:var(--text-muted); margin:2px 0;}
  .review-block .rb-topics{display:flex; flex-wrap:wrap; gap:6px; margin-top:8px;}
  .review-block .rb-chip{
    font-size:11.5px; background:#F1FBF3; color:var(--green-dark); border-radius:14px; padding:4px 10px; font-weight:600;
  }
  .summary-strip{
    background:var(--navy-900); color:#fff; border-radius:12px; padding:16px 18px; margin-bottom:18px;
    display:flex; align-items:center; gap:14px;
  }
  .summary-strip .num{font-size:26px; font-weight:700; color:var(--green);}
  .summary-strip .txt{font-size:13px; color:#C7D0DE; line-height:1.4;}

  /* Done screen */
  .done-wrap{padding:60px 24px; text-align:center;}
  .done-icon{
    width:64px; height:64px; border-radius:50%; background:#F1FBF3; color:var(--green-dark);
    display:flex; align-items:center; justify-content:center; font-size:30px; margin:0 auto 18px;
  }
  .done-wrap h2{font-size:20px; margin:0 0 8px;}
  .done-wrap p{font-size:14px; color:var(--text-muted); max-width:400px; margin:0 auto 22px; line-height:1.6;}

  .empty-hint{font-size:13.5px; color:var(--text-muted); padding:14px 0;}
</style>
</head>

/* ======================================================================
   ESTADO
   ====================================================================== */
let state = {
  step: 'intro',
  nome:'', empresa:'',
  selectedAreas: new Set(),
  selectedModules: new Set(),
  moduleIdx: 0,
  data: {}, // {moduleId: {topics:Set, other:'', duvidas:'', dates:'', emails:''}}
  openDetails: new Set(),
  submitting: false
};

function ensureModuleData(id){
  if(!state.data[id]) state.data[id] = {topics:new Set(), other:'', duvidas:'', dates:'', emails:'', turno:''};
  return state.data[id];
}

/* ======================================================================
   RENDER
   ====================================================================== */
const app = document.getElementById('app');

function render(){
  let html = '';
  html += renderHero();
  html += '<div class="content-card">';
  html += renderProgress();
  html += '<div id="stepBody">' + renderStep() + '</div>';
  html += renderNav();
  html += '</div>';
  app.innerHTML = html;
  attachHandlers();
}

function renderHero(){
  return `
  <div class="hero">
    <span class="hero-badge">${escapeHtml(HERO.badge)}</span>
    <h1>${escapeHtml(HERO.title)}</h1>
    <p>${escapeHtml(HERO.subtitle)}</p>
  </div>`;
}

function totalProgressSteps(){
  // intro, modules, [one per selected module], review = 3 + N
  return 3 + Math.max(state.selectedModules.size,0);
}
function currentProgressIndex(){
  const order = ['intro','modules'];
  if(order.includes(state.step)) return order.indexOf(state.step);
  if(state.step === 'moduleDetail') return 2 + state.moduleIdx;
  if(state.step === 'review' || state.step === 'done') return totalProgressSteps()-1;
  return 0;
}
function renderProgress(){
  if(state.step === 'done') return '';
  const total = totalProgressSteps();
  const idx = currentProgressIndex();
  const pct = Math.min(100, Math.round((idx/(total-1))*100));
  const labelMap = {intro:'Início', modules:'Módulos', moduleDetail:'Detalhes do módulo', review:'Revisão'};
  return `
  <div class="progress-wrap">
    <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="progress-label"><span>${labelMap[state.step] || ''}</span><span>${pct}%</span></div>
  </div>`;
}

function renderStep(){
  switch(state.step){
    case 'intro': return stepIntro();
    case 'modules': return stepModules();
    case 'moduleDetail': return stepModuleDetail();
    case 'review': return stepReview();
    case 'done': return stepDone();
    default: return '';
  }
}

function stepIntro(){
  const cards = AREAS.map(a=>{
    const sel = state.selectedAreas.has(a.id);
    return `
    <div class="area-card ${sel?'selected':''}" data-area="${a.id}">
      <div class="area-icon">${a.icon}</div>
      <div>
        <p class="area-name">${a.name}</p>
        <p class="area-count">${a.modules.length} módulo${a.modules.length>1?'s':''} disponíve${a.modules.length>1?'is':'l'}</p>
      </div>
      <div class="check-dot">${sel?'✓':''}</div>
    </div>`;
  }).join('');
  return `
  <div class="step">
    <h2>Vamos começar</h2>
    <p class="sub">Conta pra gente quem é você e quais áreas te interessam.</p>
    <label class="field-label">Nome</label>
    <input type="text" id="inpNome" value="${escapeAttr(state.nome)}" placeholder="Seu nome completo">
    <label class="field-label">Empresa</label>
    <input type="text" id="inpEmpresa" value="${escapeAttr(state.empresa)}" placeholder="Nome da empresa">
    <label class="field-label" style="margin-top:14px;">Quais áreas te interessam?</label>
    <div class="area-grid">${cards}</div>
  </div>`;
}

function stepModules(){
  const groups = AREAS.filter(a=>state.selectedAreas.has(a.id)).map(a=>{
    const cards = a.modules.map(mid=>{
      const m = MODULES[mid];
      const sel = state.selectedModules.has(mid);
      return `
      <div class="module-card ${sel?'selected':''}" data-module="${mid}">
        <div class="m-check">${sel?'✓':''}</div>
        <div class="m-top"><span class="m-icon">${m.icon}</span><span class="m-name">${m.name}</span></div>
        <p class="m-count">${m.chips.length} tópico${m.chips.length>1?'s':''}</p>
      </div>`;
    }).join('');
    return `<p class="module-group-title">${a.name}</p><div class="module-grid">${cards}</div>`;
  }).join('');
  return `
  <div class="step">
    <h2>Escolha os módulos</h2>
    <p class="sub">Marque só o que faz sentido capacitar agora. Dá pra voltar aqui depois.</p>
    ${groups || '<p class="empty-hint">Volte e selecione ao menos uma área.</p>'}
  </div>`;
}

function stepModuleDetail(){
  const ids = Array.from(state.selectedModules);
  if(ids.length === 0) return `<div class="step"><p class="empty-hint">Nenhum módulo selecionado. Volte e escolha ao menos um.</p></div>`;
  const mid = ids[state.moduleIdx];
  const m = MODULES[mid];
  const d = ensureModuleData(mid);
  const isOpen = state.openDetails.has(mid);

  const chips = m.chips.map(c=>{
    const sel = d.topics.has(c);
    return `<div class="chip ${sel?'selected':''}" data-chip="${escapeAttr(c)}">${c}</div>`;
  }).join('');
  const allSelected = m.chips.length > 0 && m.chips.every(c=>d.topics.has(c));

  const groupsHtml = m.groups.map(g=>{
    const items = g.items.map(it=>`<li>${it}</li>`).join('');
    return `<h4>${g.title}</h4><ul>${items}</ul>`;
  }).join('');

  return `
  <div class="step">
    <div class="module-detail-card">
      <div class="md-header"><span class="m-icon">${m.icon}</span><h3>${m.name}</h3></div>
      <p class="md-index">Módulo ${state.moduleIdx+1} de ${ids.length}</p>

      ${m.groups.length ? `
      <button class="details-toggle ${isOpen?'open':''}" id="toggleDetails">
        <span class="arrow">▸</span> ${isOpen?'Ocultar':'Ver'} conteúdo programático completo
      </button>
      ${isOpen ? `<div class="programmatic">${groupsHtml}</div>` : ''}
      ` : ''}

      <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:10px;">
        <label class="field-label" style="margin:0">Quais tópicos te interessam?</label>
        <button type="button" class="select-all-btn" id="btnSelectAllTopics">${allSelected ? 'Desmarcar todos' : 'Selecionar todos'}</button>
      </div>
      <div class="chip-wrap">${chips}</div>

      <label class="field-label" style="margin-top:14px;">Turno de preferência para a capacitação</label>
      <div class="chip-wrap">
        <div class="chip turno-chip ${d.turno==='Manhã'?'selected':''}" data-turno="Manhã">Manhã</div>
        <div class="chip turno-chip ${d.turno==='Tarde'?'selected':''}" data-turno="Tarde">Tarde</div>
      </div>

      <label class="field-label" style="margin-top:14px;">Dúvidas específicas sobre este módulo</label>
      <textarea id="inpDuvidas" placeholder="Conte pra gente o que precisa ser esclarecido">${escapeHtml(d.duvidas)}</textarea>

      <label class="field-label">✉️ E-mail dos participantes</label>
      <input type="text" id="inpEmails" value="${escapeAttr(d.emails)}" placeholder="separados por vírgula">
    </div>
  </div>`;
}

function stepReview(){
  const ids = Array.from(state.selectedModules);
  const blocks = ids.map(mid=>{
    const m = MODULES[mid];
    const d = ensureModuleData(mid);
    const topics = Array.from(d.topics);
    return `
    <div class="review-block">
      <h4><span>${m.icon}</span> ${m.name}</h4>
      ${d.turno ? `<p class="rb-meta">🕐 Turno: ${escapeHtml(d.turno)}</p>` : ''}
      ${d.dates ? `<p class="rb-meta">📅 ${escapeHtml(d.dates)}</p>` : ''}
      ${d.emails ? `<p class="rb-meta">✉️ ${escapeHtml(d.emails)}</p>` : ''}
      ${d.duvidas ? `<p class="rb-meta">💬 ${escapeHtml(d.duvidas)}</p>` : ''}
      <div class="rb-topics">
        ${topics.map(t=>`<span class="rb-chip">${t}</span>`).join('')}
        ${d.other ? `<span class="rb-chip">${escapeHtml(d.other)}</span>` : ''}
      </div>
    </div>`;
  }).join('');

  return `
  <div class="step">
    <h2>Revise seu plano</h2>
    <p class="sub">Confira tudo antes de enviar para a Universidade Sankhya.</p>
    <div class="summary-strip">
      <span class="num">${ids.length}</span>
      <span class="txt">módulo${ids.length!==1?'s':''} de capacitação para <strong>${escapeHtml(state.empresa||'sua empresa')}</strong></span>
    </div>
    ${blocks || '<p class="empty-hint">Nenhum módulo selecionado.</p>'}
  </div>`;
}

function stepDone(){
  return `
  <div class="done-wrap">
    <div class="done-icon">✓</div>
    <h2>Plano enviado com sucesso!</h2>
    <p>Recebemos suas escolhas. Nosso time da Universidade Sankhya vai entrar em contato para confirmar as conexões agendadas.</p>
  </div>`;
}

function renderNav(){
  if(state.step === 'done') return '';
  const canGoBack = state.step !== 'intro';
  let nextLabel = 'Continuar';
  let nextDisabled = false;

  if(state.step === 'intro'){
    nextDisabled = !state.nome.trim() || !state.empresa.trim() || state.selectedAreas.size === 0;
  }
  if(state.step === 'modules'){
    nextDisabled = state.selectedModules.size === 0;
    nextLabel = 'Ver detalhes dos módulos';
  }
  if(state.step === 'moduleDetail'){
    const ids = Array.from(state.selectedModules);
    nextLabel = (state.moduleIdx === ids.length-1) ? 'Revisar plano' : 'Próximo módulo';
  }
  if(state.step === 'review'){
    nextLabel = state.submitting ? 'Enviando...' : 'Enviar plano';
    nextDisabled = state.submitting;
  }

  return `
  <div class="nav-bar">
    ${canGoBack ? `<button class="btn btn-ghost" id="btnBack" ${state.submitting?'disabled':''}>← Voltar</button>` : `<span></span>`}
    <button class="btn btn-primary" id="btnNext" ${nextDisabled?'disabled':''}>${nextLabel}</button>
  </div>`;
}

/* ======================================================================
   HANDLERS
   ====================================================================== */
function attachHandlers(){
  const back = document.getElementById('btnBack');
  const next = document.getElementById('btnNext');
  if(back) back.onclick = goBack;
  if(next) next.onclick = goNext;

  const inpNome = document.getElementById('inpNome');
  const inpEmpresa = document.getElementById('inpEmpresa');
  if(inpNome) inpNome.oninput = e=>{ state.nome = e.target.value; updateNextButtonState(); };
  if(inpEmpresa) inpEmpresa.oninput = e=>{ state.empresa = e.target.value; updateNextButtonState(); };

  document.querySelectorAll('.area-card').forEach(el=>{
    el.onclick = ()=>{
      const id = el.dataset.area;
      state.selectedAreas.has(id) ? state.selectedAreas.delete(id) : state.selectedAreas.add(id);
      render();
    };
  });

  document.querySelectorAll('.module-card').forEach(el=>{
    el.onclick = ()=>{
      const id = parseInt(el.dataset.module);
      state.selectedModules.has(id) ? state.selectedModules.delete(id) : state.selectedModules.add(id);
      render();
    };
  });

  document.querySelectorAll('.chip').forEach(el=>{
    if(el.dataset.turno) return; // handled separately below
    el.onclick = ()=>{
      const ids = Array.from(state.selectedModules);
      const mid = ids[state.moduleIdx];
      const d = ensureModuleData(mid);
      const chip = el.dataset.chip;
      d.topics.has(chip) ? d.topics.delete(chip) : d.topics.add(chip);
      render();
    };
  });

  document.querySelectorAll('.turno-chip').forEach(el=>{
    el.onclick = ()=>{
      const ids = Array.from(state.selectedModules);
      const mid = ids[state.moduleIdx];
      const d = ensureModuleData(mid);
      const turno = el.dataset.turno;
      d.turno = (d.turno === turno) ? '' : turno;
      render();
    };
  });

  const btnSelectAll = document.getElementById('btnSelectAllTopics');
  if(btnSelectAll) btnSelectAll.onclick = ()=>{
    const ids = Array.from(state.selectedModules);
    const mid = ids[state.moduleIdx];
    const m = MODULES[mid];
    const d = ensureModuleData(mid);
    const allSelected = m.chips.length > 0 && m.chips.every(c=>d.topics.has(c));
    if(allSelected) d.topics.clear();
    else m.chips.forEach(c=>d.topics.add(c));
    render();
  };

  const toggleDetails = document.getElementById('toggleDetails');
  if(toggleDetails) toggleDetails.onclick = ()=>{
    const ids = Array.from(state.selectedModules);
    const mid = ids[state.moduleIdx];
    state.openDetails.has(mid) ? state.openDetails.delete(mid) : state.openDetails.add(mid);
    render();
  };

  ['inpDuvidas','inpEmails'].forEach(fieldId=>{
    const el = document.getElementById(fieldId);
    if(!el) return;
    el.oninput = e=>{
      const ids = Array.from(state.selectedModules);
      const mid = ids[state.moduleIdx];
      const d = ensureModuleData(mid);
      const key = {inpDuvidas:'duvidas', inpEmails:'emails'}[fieldId];
      d[key] = e.target.value;
    };
  });
}

function updateNextButtonState(){
  const btn = document.getElementById('btnNext');
  if(!btn) return;
  let disabled = false;
  if(state.step === 'intro') disabled = !state.nome.trim() || !state.empresa.trim() || state.selectedAreas.size === 0;
  if(state.step === 'modules') disabled = state.selectedModules.size === 0;
  btn.disabled = disabled;
}

function goBack(){
  if(state.step === 'modules') state.step = 'intro';
  else if(state.step === 'moduleDetail'){
    if(state.moduleIdx === 0) state.step = 'modules';
    else state.moduleIdx -= 1;
  }
  else if(state.step === 'review'){
    state.step = 'moduleDetail';
    state.moduleIdx = state.selectedModules.size - 1;
  }
  render();
  window.scrollTo({top:0, behavior:'smooth'});
}

function goNext(){
  if(state.step === 'intro') state.step = 'modules';
  else if(state.step === 'modules'){ state.step = 'moduleDetail'; state.moduleIdx = 0; }
  else if(state.step === 'moduleDetail'){
    const ids = Array.from(state.selectedModules);
    if(state.moduleIdx < ids.length-1) state.moduleIdx += 1;
    else state.step = 'review';
  }
  else if(state.step === 'review'){ submitPlan(); return; }
  render();
  window.scrollTo({top:0, behavior:'smooth'});
}

/* ======================================================================
   SUBMISSÃO
   ====================================================================== */
async function submitPlan(){
  state.submitting = true;
  render();

  const payload = {
    nome: state.nome,
    empresa: state.empresa,
    respostas: Array.from(state.selectedModules).map(mid=>{
      const m = MODULES[mid];
      const d = ensureModuleData(mid);
      return {
        modulo_id: mid,
        modulo_nome: m.name,
        topicos: Array.from(d.topics),
        outro: d.other,
        duvidas: d.duvidas,
        datas_sugeridas: d.dates,
        emails_participantes: d.emails,
        turno: d.turno
      };
    })
  };

  const configured = SUPABASE_URL.indexOf('SEU-PROJETO') === -1 && SUPABASE_ANON_KEY.indexOf('SUA_ANON_KEY') === -1;

  if(configured){
    try{
      const res = await fetch(`${SUPABASE_URL}/rest/v1/${SUPABASE_TABLE}`, {
        method:'POST',
        headers:{
          'Content-Type':'application/json',
          'apikey': SUPABASE_ANON_KEY,
          'Prefer':'return=minimal'
        },
        body: JSON.stringify(payload)
      });
      if(!res.ok) throw new Error('Falha ao enviar: ' + res.status);
    }catch(err){
      console.error('Erro ao enviar para o Supabase:', err);
      downloadJSON(payload);
    }
  } else {
    console.log('Supabase não configurado ainda. Payload da resposta:', payload);
    downloadJSON(payload);
  }

  state.submitting = false;
  state.step = 'done';
  render();
}

function downloadJSON(payload){
  try{
    const blob = new Blob([JSON.stringify(payload, null, 2)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `plano-capacitacao-${(payload.empresa||'empresa').replace(/\s+/g,'-').toLowerCase()}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  }catch(e){ console.error(e); }
}

/* ======================================================================
   UTIL
   ====================================================================== */
function escapeHtml(str){
  return (str||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function escapeAttr(str){ return escapeHtml(str); }

async function loadRemoteConfig(){
  const configured = SUPABASE_URL.indexOf('SEU-PROJETO') === -1 && SUPABASE_ANON_KEY.indexOf('SUA_ANON_KEY') === -1;
  if(!configured) return;
  try{
    const res = await fetch(`${SUPABASE_URL}/rest/v1/reconecta_config?select=data&id=eq.1`, {headers:{apikey:SUPABASE_ANON_KEY}});
    if(!res.ok) return;
    const rows = await res.json();
    if(rows && rows[0] && rows[0].data){
      if(rows[0].data.AREAS) AREAS = rows[0].data.AREAS;
      if(rows[0].data.MODULES) MODULES = rows[0].data.MODULES;
      if(rows[0].data.HERO) HERO = rows[0].data.HERO;
    }
  }catch(e){ console.warn('Conteúdo remoto indisponível, usando padrão local.', e); }
}

loadRemoteConfig().then(render);
</script>
