<style>
  :root{--navy-900:#0A1628;--navy-700:#162D52;--navy-600:#1E3B68;--green:#2ECC52;--green-dark:#1E9E3E;
  --bg:#F4F6F8;--card:#FFFFFF;--line:#E3E7EC;--text:#16202E;--text-muted:#5B6675;--radius:12px;}
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);}
  #app{max-width:1000px;margin:0 auto;padding:24px 20px 80px;}
  .topbar{display:flex;align-items:center;justify-content:space-between;background:linear-gradient(135deg,var(--navy-900),var(--navy-700));
  color:#fff;padding:16px 22px;border-radius:14px;margin-bottom:22px;}
  .topbar h1{font-size:16px;margin:0;font-weight:600;}
  .topbar .sub{font-size:12px;color:#C7D0DE;}
  .btn{font-family:inherit;font-size:13.5px;font-weight:600;padding:9px 16px;border-radius:9px;border:none;cursor:pointer;}
  .btn-primary{background:var(--green);color:#fff;}
  .btn-primary:hover{background:var(--green-dark);}
  .btn-ghost{background:rgba(255,255,255,0.12);color:#fff;}
  .btn-ghost:hover{background:rgba(255,255,255,0.2);}
  .btn-line{background:#fff;border:1px solid var(--line);color:var(--text);}
  .btn-line:hover{border-color:var(--green);}
  input,textarea{font-family:inherit;font-size:14px;padding:10px 12px;border:1px solid var(--line);border-radius:9px;width:100%;margin-bottom:12px;}
  label{font-size:13px;font-weight:600;display:block;margin-bottom:5px;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px;margin-bottom:14px;}
  .tabs{display:flex;gap:8px;margin-bottom:18px;}
  .tab{padding:9px 16px;border-radius:9px;font-size:13.5px;font-weight:600;cursor:pointer;color:var(--text-muted);}
  .tab.active{background:var(--navy-700);color:#fff;}
  table{width:100%;border-collapse:collapse;font-size:13px;}
  th{text-align:left;font-size:11.5px;text-transform:uppercase;letter-spacing:.03em;color:var(--text-muted);padding:8px 10px;border-bottom:1.5px solid var(--line);}
  td{padding:10px;border-bottom:1px solid var(--line);vertical-align:top;}
  tr:hover td{background:#FAFBFC;}
  .pill{display:inline-block;font-size:11px;font-weight:600;background:#F1FBF3;color:var(--green-dark);padding:3px 9px;border-radius:12px;margin:2px 3px 0 0;}
  .pill-select{appearance:none;-webkit-appearance:none;border:none;border-radius:12px;padding:5px 10px;font-size:11.5px;font-weight:600;font-family:inherit;cursor:pointer;min-width:110px;margin:0;}
  .row-actions{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center;}
  .login-wrap{max-width:360px;margin:80px auto;text-align:center;}
  .login-wrap h2{font-size:18px;margin-bottom:4px;}
  .login-wrap p{font-size:13px;color:var(--text-muted);margin-bottom:18px;}
  .err{color:#B3261E;font-size:13px;margin:-6px 0 12px;}
  .empty{color:var(--text-muted);font-size:13.5px;padding:24px 0;text-align:center;}
  .expand-btn{font-size:12px;color:var(--navy-600);font-weight:600;cursor:pointer;background:none;border:none;padding:0;}
  .detail-row td{background:#FAFBFC;font-size:12.5px;}
  details.mod-editor{border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin-bottom:10px;}
  details.mod-editor summary{cursor:pointer;font-weight:600;font-size:13.5px;}
  .g2{display:grid;grid-template-columns:60px 1fr;gap:10px;}
  .area-title{font-size:13px;font-weight:700;color:var(--navy-600);text-transform:uppercase;letter-spacing:.03em;margin:18px 0 8px;}
</style>
</head>

]},

} };

let session = null; // {access_token, refresh_token}

function saveSession(s){
  session = s;
  try{ localStorage.setItem('reconecta_admin_session', JSON.stringify(s)); }catch(e){}
}
function clearSession(){
  session = null;
  try{ localStorage.removeItem('reconecta_admin_session'); }catch(e){}
}
async function restoreSession(){
  let stored = null;
  try{ stored = JSON.parse(localStorage.getItem('reconecta_admin_session') || 'null'); }catch(e){}
  if(!stored || !stored.refresh_token) return;
  try{
    const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=refresh_token`,{
      method:'POST',
      headers:{'Content-Type':'application/json','apikey':SUPABASE_ANON_KEY},
      body: JSON.stringify({refresh_token: stored.refresh_token})
    });
    const j = await res.json();
    if(res.ok && j.access_token){
      saveSession({access_token:j.access_token, refresh_token:j.refresh_token});
      await Promise.all([loadRespostas(), loadConfig()]);
    } else {
      clearSession();
    }
  }catch(e){ clearSession(); }
}
let authMode = 'login';
let tab = 'respostas';
let respostas = [];
let config = null; // {AREAS, MODULES}
let expandedRow = null;

const DEFAULT_STATUSES = [
  {nome:'Agendado', cor:'green'},
  {nome:'Em andamento', cor:'blue'},
  {nome:'Concluído', cor:'gray'}
];
const DEFAULT_RESPONSAVEIS = [];
const DEFAULT_PROJETOS = [];
const PILL_COLORS = {
  green:['#EAF3DE','#27500A'], blue:['#E6F1FB','#0C447C'], amber:['#FAEEDA','#633806'],
  coral:['#FAECE7','#4A1B0C'], purple:['#EEEDFE','#26215C'], teal:['#E1F5EE','#04342C'], gray:['#F1EFE8','#2C2C2A']
};
function getStatuses(){ return (config && config.STATUSES) || DEFAULT_STATUSES; }
function getResponsaveis(){ return (config && config.RESPONSAVEIS) || DEFAULT_RESPONSAVEIS; }
function getProjetos(){ return (config && config.PROJETOS) || DEFAULT_PROJETOS; }
function statusColorName(nome){ const s = getStatuses().find(x=>x.nome===nome); return s ? s.cor : 'gray'; }
function pillCss(colorName){ const [bg,fg] = PILL_COLORS[colorName]||PILL_COLORS.gray; return `background:${bg};color:${fg}`; }
function ensureConfig(){
  if(!config) config = {AREAS:[], MODULES:{}};
  if(!config.STATUSES) config.STATUSES = DEFAULT_STATUSES.slice();
  if(!config.RESPONSAVEIS) config.RESPONSAVEIS = DEFAULT_RESPONSAVEIS.slice();
  if(!config.PROJETOS) config.PROJETOS = DEFAULT_PROJETOS.slice();
}
async function saveConfigSilent(){
  try{
    await fetch(`${SUPABASE_URL}/rest/v1/reconecta_config`, {
      method:'POST',
      headers:{...authHeaders(), 'Prefer':'resolution=merge-duplicates'},
      body: JSON.stringify({id:1, data: config})
    });
  }catch(e){ console.error('Erro ao salvar opções', e); }
}
async function updateRespostaField(id, field, value){
  const r = respostas.find(x=>x.id===id);
  if(r) r[field] = value;
  try{
    const res = await fetch(`${SUPABASE_URL}/rest/v1/reconecta_respostas?id=eq.${id}`, {
      method:'PATCH',
      headers:{...authHeaders(), 'Prefer':'return=minimal'},
      body: JSON.stringify({[field]: value})
    });
    if(!res.ok){
      const j = await res.json().catch(()=>({}));
      alert('Não foi possível salvar: ' + (j.message || res.status) + '\nConfira se o SQL de update/grant foi aplicado no Supabase.');
    }
  }catch(e){ alert('Erro de conexão ao salvar. Tente novamente.'); }
}
let loading = false;
let loginError = '';

const app = document.getElementById('app');
const configured = SUPABASE_URL.indexOf('SEU-PROJETO') === -1;

function render(){
  if(!configured){
    app.innerHTML = `<div class="login-wrap"><h2>Configure o Supabase</h2><p>Edite SUPABASE_URL e SUPABASE_ANON_KEY no topo deste arquivo (os mesmos valores usados no index.html) antes de usar o painel.</p></div>`;
    return;
  }
  if(!session){ renderLogin(); return; }
  let html = `
  <div class="topbar">
    <div><h1>Painel · Universidade Sankhya</h1><div class="sub">Plano de Capacitação — Reconecta</div></div>
    <button class="btn btn-ghost" id="btnLogout">Sair</button>
  </div>
  <div class="tabs">
    <div class="tab ${tab==='respostas'?'active':''}" data-tab="respostas">Respostas</div>
    <div class="tab ${tab==='conteudo'?'active':''}" data-tab="conteudo">Conteúdo</div>
  </div>
  <div id="tabBody">${tab==='respostas' ? renderRespostas() : renderConteudo()}</div>`;
  app.innerHTML = html;
  attachHandlers();
}

function renderLogin(){
  const isSignup = authMode === 'signup';
  app.innerHTML = `
  <div class="login-wrap">
    <h2>Painel da Universidade Sankhya</h2>
    <p>${isSignup ? 'Crie sua conta com e-mail @sankhya.com.br.' : 'Acesso restrito ao time. Use seu login Supabase.'}</p>
    <div class="card" style="text-align:left">
      <label>E-mail</label>
      <input type="text" id="loginEmail" placeholder="voce@sankhya.com.br">
      <label>Senha</label>
      <input type="password" id="loginSenha">
      ${loginError ? `<p class="err">${loginError}</p>` : ''}
      <button class="btn btn-primary" style="width:100%" id="btnLogin">${isSignup ? 'Criar conta' : 'Entrar'}</button>
      <p style="text-align:center;font-size:12.5px;margin-top:12px">
        <a href="#" id="toggleAuthMode" style="color:var(--navy-600);font-weight:600">${isSignup ? 'Já tem conta? Entrar' : 'Não tem conta? Criar conta'}</a>
      </p>
    </div>
  </div>`;
  document.getElementById('btnLogin').onclick = isSignup ? doSignup : doLogin;
  document.getElementById('toggleAuthMode').onclick = (e)=>{
    e.preventDefault();
    authMode = isSignup ? 'login' : 'signup';
    loginError = '';
    render();
  };
}

async function doSignup(){
  const email = document.getElementById('loginEmail').value.trim();
  const senha = document.getElementById('loginSenha').value;
  loginError = '';
  if(!/^[A-Za-z0-9._%+-]+@sankhya\.com\.br$/i.test(email)){
    loginError = 'Use um e-mail @sankhya.com.br para criar a conta.';
    render();
    return;
  }
  if(senha.length < 6){
    loginError = 'A senha precisa ter pelo menos 6 caracteres.';
    render();
    return;
  }
  try{
    const res = await fetch(`${SUPABASE_URL}/auth/v1/signup`,{
      method:'POST',
      headers:{'Content-Type':'application/json','apikey':SUPABASE_ANON_KEY},
      body: JSON.stringify({email, password: senha})
    });
    const j = await res.json();
    if(!res.ok){ loginError = j.msg || j.error_description || 'Não foi possível criar a conta.'; render(); return; }
    if(j.access_token){
      saveSession({access_token: j.access_token, refresh_token: j.refresh_token});
      await Promise.all([loadRespostas(), loadConfig()]);
      render();
    } else {
      loginError = '';
      authMode = 'login';
      alert('Conta criada! Faça login para continuar.');
      render();
    }
  }catch(e){ loginError = 'Erro ao conectar. Tente novamente.'; render(); }
}

async function doLogin(){
  const email = document.getElementById('loginEmail').value.trim();
  const senha = document.getElementById('loginSenha').value;
  loginError = '';
  try{
    const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`,{
      method:'POST',
      headers:{'Content-Type':'application/json','apikey':SUPABASE_ANON_KEY},
      body: JSON.stringify({email, password: senha})
    });
    const j = await res.json();
    if(!res.ok || !j.access_token){ loginError = 'E-mail ou senha inválidos.'; render(); return; }
    saveSession({access_token: j.access_token, refresh_token: j.refresh_token});
    await Promise.all([loadRespostas(), loadConfig()]);
    render();
  }catch(e){ loginError = 'Erro ao conectar. Tente novamente.'; render(); }
}

function authHeaders(){
  return {apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${session.access_token}`, 'Content-Type':'application/json'};
}

async function loadRespostas(){
  const res = await fetch(`${SUPABASE_URL}/rest/v1/reconecta_respostas?select=*&order=created_at.desc`, {headers:authHeaders()});
  respostas = res.ok ? await res.json() : [];
}
async function loadConfig(){
  const res = await fetch(`${SUPABASE_URL}/rest/v1/reconecta_config?select=data&id=eq.1`, {headers:authHeaders()});
  const rows = res.ok ? await res.json() : [];
  config = (rows[0] && rows[0].data) ? rows[0].data : null;
}

/* ---------- Respostas (spreadsheet) ---------- */
function renderRespostas(){
  if(!respostas.length) return `<div class="empty">Nenhuma resposta ainda.</div>`;
  const rows = respostas.map((r,i)=>{
    const mods = (r.respostas||[]);
    const isOpen = expandedRow === i;
    const statusOpts = getStatuses().map(s=>`<option value="${esc(s.nome)}" ${r.status===s.nome?'selected':''}>${esc(s.nome)}</option>`).join('');
    const respOpts = getResponsaveis().map(nm=>`<option value="${esc(nm)}" ${r.responsavel===nm?'selected':''}>${esc(nm)}</option>`).join('');
    const projOpts = getProjetos().map(nm=>`<option value="${esc(nm)}" ${r.projeto===nm?'selected':''}>${esc(nm)}</option>`).join('');
    return `
    <tr>
      <td>${fmtDate(r.created_at)}</td>
      <td>${esc(r.nome)}</td>
      <td>${esc(r.empresa)}</td>
      <td>${mods.length}</td>
      <td>${mods.map(m=>`<span class="pill">${esc(m.modulo_nome)}</span>`).join('')}</td>
      <td><select class="pill-select status-select" data-id="${r.id}" style="${pillCss(statusColorName(r.status))}">
        <option value="">—</option>${statusOpts}<option value="__new__">+ Novo status…</option>
      </select></td>
      <td><select class="pill-select resp-select" data-id="${r.id}" style="${pillCss('purple')}">
        <option value="">—</option>${respOpts}<option value="__new__">+ Novo responsável…</option>
      </select></td>
      <td><select class="pill-select proj-select" data-id="${r.id}" style="${pillCss('teal')}">
        <option value="">—</option>${projOpts}<option value="__new__">+ Novo projeto…</option>
      </select></td>
      <td><button class="expand-btn" data-row="${i}">${isOpen?'Fechar':'Ver detalhes'}</button></td>
    </tr>
    ${isOpen ? `<tr class="detail-row"><td colspan="9">${renderDetail(mods)}</td></tr>` : ''}`;
  }).join('');
  return `
  <div class="row-actions">
    <button class="btn btn-primary" id="btnExport">⬇ Exportar Excel</button>
    <span style="font-size:13px;color:var(--text-muted)">${respostas.length} resposta${respostas.length!==1?'s':''}</span>
  </div>
  <div class="card" style="overflow-x:auto">
    <table>
      <tr><th>Data</th><th>Nome</th><th>Empresa</th><th>Módulos</th><th>Selecionados</th><th>Status</th><th>Responsável</th><th>Projeto</th><th></th></tr>
      ${rows}
    </table>
  </div>`;
}

function renderDetail(mods){
  return mods.map(m=>`
    <div style="margin-bottom:10px">
      <strong>${esc(m.modulo_nome)}</strong><br>
      ${m.topicos && m.topicos.length ? `Tópicos: ${m.topicos.map(esc).join(', ')}<br>` : ''}
      ${m.outro ? `Outro: ${esc(m.outro)}<br>` : ''}
      ${m.duvidas ? `Dúvidas: ${esc(m.duvidas)}<br>` : ''}
      ${m.datas_sugeridas ? `Datas: ${esc(m.datas_sugeridas)}<br>` : ''}
      ${m.emails_participantes ? `E-mails: ${esc(m.emails_participantes)}` : ''}
    </div>`).join('');
}

function exportExcel(){
  const rows = [];
  respostas.forEach(r=>{
    (r.respostas||[]).forEach(m=>{
      rows.push({
        Data: fmtDate(r.created_at), Nome: r.nome, Empresa: r.empresa,
        Status: r.status||'', Responsavel: r.responsavel||'', Projeto: r.projeto||'',
        Modulo: m.modulo_nome, Topicos: (m.topicos||[]).join(', '), Outro: m.outro||'',
        Duvidas: m.duvidas||'', 'Datas sugeridas': m.datas_sugeridas||'', 'E-mails participantes': m.emails_participantes||''
      });
    });
  });
  const ws = XLSX.utils.json_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'Respostas');
  XLSX.writeFile(wb, `respostas-reconecta-${new Date().toISOString().slice(0,10)}.xlsx`);
}

/* ---------- Conteúdo (editor) ---------- */
function renderConteudo(){
  if(!config || !config.AREAS) return `<div class="empty">Conteúdo remoto ainda não configurado.<br><button class="btn btn-primary" style="margin-top:10px" id="btnSeedConfig">Carregar conteúdo padrão do formulário para editar</button></div>`;
  const areasHtml = config.AREAS.map(a=>{
    const modsHtml = a.modules.map(mid=>{
      const m = config.MODULES[mid];
      if(!m) return '';
      return `
      <details class="mod-editor">
        <summary>${m.icon} ${m.name}</summary>
        <div style="margin-top:10px">
          <div class="g2">
            <div><label>Ícone</label><input data-f="icon" data-mid="${mid}" value="${esc(m.icon)}"></div>
            <div><label>Nome do módulo</label><input data-f="name" data-mid="${mid}" value="${esc(m.name)}"></div>
          </div>
          <label>Tópicos (um por linha)</label>
          <textarea data-f="chips" data-mid="${mid}" rows="4">${esc((m.chips||[]).join('\\n'))}</textarea>
          <label>Conteúdo programático (JSON avançado — opcional)</label>
          <textarea data-f="groups" data-mid="${mid}" rows="4">${esc(JSON.stringify(m.groups||[], null, 2))}</textarea>
        </div>
      </details>`;
    }).join('');
    return `<div class="area-title">${esc(a.name)}</div>${modsHtml}`;
  }).join('');
  return `
  <div class="row-actions">
    <button class="btn btn-primary" id="btnSaveConfig">💾 Salvar alterações</button>
    <span style="font-size:12.5px;color:var(--text-muted)">As alterações valem para o formulário assim que forem salvas.</span>
  </div>
  ${areasHtml}`;
}

async function saveConfig(){
  document.querySelectorAll('[data-f]').forEach(el=>{
    const mid = el.dataset.mid, f = el.dataset.f;
    const m = config.MODULES[mid];
    if(!m) return;
    if(f === 'icon') m.icon = el.value;
    if(f === 'name') m.name = el.value;
    if(f === 'chips') m.chips = el.value.split('\\n').map(s=>s.trim()).filter(Boolean);
    if(f === 'groups'){ try{ m.groups = JSON.parse(el.value); }catch(e){ alert('JSON inválido em "'+m.name+'" — não foi salvo.'); } }
  });
  const res = await fetch(`${SUPABASE_URL}/rest/v1/reconecta_config`, {
    method:'POST',
    headers:{...authHeaders(), 'Prefer':'resolution=merge-duplicates'},
    body: JSON.stringify({id:1, data: config})
  });
  if(res.ok) alert('Conteúdo salvo!'); else alert('Erro ao salvar. Confira as policies do Supabase.');
}

function seedConfig(){
  config = { ...window.DEFAULT_CONFIG, STATUSES: (config&&config.STATUSES)||undefined, RESPONSAVEIS: (config&&config.RESPONSAVEIS)||undefined, PROJETOS: (config&&config.PROJETOS)||undefined };
  render();
}

/* ---------- util/handlers ---------- */
function esc(s){ return (s==null?'':String(s)).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function fmtDate(iso){ if(!iso) return ''; const d = new Date(iso); return d.toLocaleDateString('pt-BR')+' '+d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}); }

function attachHandlers(){
  const logout = document.getElementById('btnLogout');
  if(logout) logout.onclick = ()=>{ clearSession(); render(); };
  document.querySelectorAll('.tab').forEach(el=> el.onclick = ()=>{ tab = el.dataset.tab; expandedRow=null; render(); });
  document.querySelectorAll('.expand-btn').forEach(el=> el.onclick = ()=>{ const i=parseInt(el.dataset.row); expandedRow = expandedRow===i?null:i; render(); });
  document.querySelectorAll('.proj-select').forEach(el=>{
    el.onchange = async ()=>{
      if(el.value === '__new__'){
        const nome = (prompt('Nome do novo projeto:')||'').trim();
        if(!nome){ render(); return; }
        ensureConfig();
        if(!config.PROJETOS.includes(nome)) config.PROJETOS.push(nome);
        await saveConfigSilent();
        await updateRespostaField(el.dataset.id, 'projeto', nome);
      } else {
        await updateRespostaField(el.dataset.id, 'projeto', el.value);
      }
      render();
    };
  });
  const exp = document.getElementById('btnExport'); if(exp) exp.onclick = exportExcel;
  document.querySelectorAll('.status-select').forEach(el=>{
    el.onchange = async ()=>{
      if(el.value === '__new__'){
        const nome = (prompt('Nome do novo status:')||'').trim();
        if(!nome){ render(); return; }
        ensureConfig();
        const colors=['green','blue','amber','coral','purple','teal','gray'];
        if(!config.STATUSES.find(s=>s.nome===nome)) config.STATUSES.push({nome, cor: colors[config.STATUSES.length % colors.length]});
        await saveConfigSilent();
        await updateRespostaField(el.dataset.id, 'status', nome);
      } else {
        await updateRespostaField(el.dataset.id, 'status', el.value);
      }
      render();
    };
  });
  document.querySelectorAll('.resp-select').forEach(el=>{
    el.onchange = async ()=>{
      if(el.value === '__new__'){
        const nome = (prompt('Nome do responsável:')||'').trim();
        if(!nome){ render(); return; }
        ensureConfig();
        if(!config.RESPONSAVEIS.includes(nome)) config.RESPONSAVEIS.push(nome);
        await saveConfigSilent();
        await updateRespostaField(el.dataset.id, 'responsavel', nome);
      } else {
        await updateRespostaField(el.dataset.id, 'responsavel', el.value);
      }
      render();
    };
  });
  const save = document.getElementById('btnSaveConfig'); if(save) save.onclick = saveConfig;
  const seed = document.getElementById('btnSeedConfig'); if(seed) seed.onclick = seedConfig;
}

render();
restoreSession().then(render);
</script>
